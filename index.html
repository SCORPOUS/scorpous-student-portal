<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scorpous Study Portal</title>
    <meta name="description" content="Interactive study portal for Physics, Maths, and Chemistry notes." />
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #07111f, #133a63);
        color: #f8fbff;
      }
      .card {
        text-align: center;
        padding: 2rem;
        border-radius: 20px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      }
      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.8rem 1.2rem;
        border-radius: 999px;
        background: #2f7cff;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Scorpous Study Portal</h1>
      <p>Redirecting to the login page...</p>
      <a href="./userlogin/index.html">Open the website</a>
    </main>
    <script>
      window.location.replace("./userlogin/index.html");
    </script>
  </body>
</html>
